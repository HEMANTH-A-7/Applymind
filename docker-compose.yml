version: "3.9"

services:
  # ─── PostgreSQL Database ───
  postgres:
    image: postgres:16-alpine
    container_name: applymind_postgres
    environment:
      POSTGRES_USER: applymind
      POSTGRES_PASSWORD: applymind123
      POSTGRES_DB: applymind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applymind"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Task Queue) ───
  redis:
    image: redis:7-alpine
    container_name: applymind_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: applymind_backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ─── Celery Worker ───
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: applymind_celery
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    command: celery -A core.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
